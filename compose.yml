name: pc-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: pc-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pc_agent}
      POSTGRES_USER: ${POSTGRES_USER:-pc_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pc_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pc_agent} -d ${POSTGRES_DB:-pc_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pc-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: pc-agent-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma

volumes:
  postgres-data:
  redis-data:
  chroma-data:
